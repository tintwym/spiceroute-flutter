name: savor_global
description: "SpiceRoute - mobile + web"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  intl: any
  characters: ^1.4.0
  flutter_svg: ^2.0.10

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # Community board upload: real photo picker + client-side compression
  # so a phone-sized HEIC drops under Firestore's 1 MB document cap
  # before we base64 it into the doc.
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
  # Bundled serif headline face. We were fetching this from
  # fonts.gstatic.com via the google_fonts package, which logs a runtime
  # exception (and falls back to Roboto) whenever the user is offline or
  # behind a firewall. Bundling avoids that entirely and makes the first
  # paint feel snappier — no waiting on a network font.
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#5A5A40"
    theme_color: "#5A5A40"
  adaptive_icon_background: "#5A5A40"
  adaptive_icon_foreground: "assets/icon/icon.png"
