name: spiceroute
description: "SpiceRoute - mobile + web"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.10.0
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  # Pinned with a caret range. We were on `any`, which means a fresh
  # `pub get` on a CI machine could pull a newer major version that
  # breaks our l10n generated code without warning. Caret allows
  # minor + patch upgrades within 0.20.x.
  intl: ^0.20.2
  characters: ^1.4.1
  flutter_svg: ^2.3.0
  flutter_staggered_grid_view: ^0.7.0

  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.3.0

  # Community board upload: real photo picker + client-side compression
  # so a phone-sized HEIC drops under Firestore's 1 MB document cap
  # before we base64 it into the doc.
  image_picker: ^1.2.3
  flutter_image_compress: ^2.4.0
  native_liquid_glass: ^0.2.12
  # 1.6.1+ needs win32 ^6; flutter_secure_storage 9.x still needs win32 ^5.
  wakelock_plus: ^1.5.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  # 2.4.8+ requires meta ^1.18.0; flutter_test from the SDK pins meta 1.17.0.
  flutter_native_splash: ^2.4.7
  fake_cloud_firestore: ^3.1.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
  # Bundled serif headline face. We were fetching this from
  # fonts.gstatic.com via the google_fonts package, which logs a runtime
  # exception (and falls back to Roboto) whenever the user is offline or
  # behind a firewall. Bundling avoids that entirely and makes the first
  # paint feel snappier — no waiting on a network font.
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
          weight: 700
    # Body / UI face. Paired with Playfair Display following the
    # standard editorial-pairing pattern: serif for the big
    # decorative headlines, geometric sans for everything else
    # (body copy, buttons, form fields, app chrome).
    #
    # We bundle the variable TTF for the same reason we bundle
    # Playfair Display — using the `google_fonts` package would
    # fetch this from fonts.gstatic.com on first use and log a
    # runtime exception (falling back to Roboto) for anyone
    # offline or behind a firewall. Bundling makes the first
    # paint deterministic.
    #
    # Variable font caveat: a single file covers weights 100-900,
    # but `pubspec.yaml`'s `fonts:` declaration still needs
    # explicit entries per weight Flutter should ask the engine
    # for. We register only 400 (default) and 700 (bold) because
    # those are the only two the current theme actually requests.
    # Add more here only if/when a new TextStyle pulls a
    # different `FontWeight`.
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
        - asset: assets/fonts/InterVariable.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#5A5A40"
    theme_color: "#5A5A40"
  adaptive_icon_background: "#5A5A40"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#5A5A40"
  image: assets/icon/icon.png
  web: false
  android_12:
    color: "#5A5A40"
    image: assets/icon/icon.png
    icon_background_color: "#5A5A40"
